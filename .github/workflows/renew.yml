name: JustRunMy 自动续期 (无序随机版)

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 06:00 (UTC 22:00) 触发
    - cron: '0 22 * * *'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should_run: ${{ steps.check-schedule.outputs.should_run }}
      base_delay: ${{ steps.pick-delay.outputs.base_delay }}
      trigger_epoch: ${{ steps.pick-delay.outputs.trigger_epoch }}
    steps:
    - name: 📅 每日多账号随机签到
      id: check-schedule
      shell: bash
      run: |
        echo "should_run=true" >> $GITHUB_OUTPUT
        echo "📅 每日签到模式已启动，所有账号将在不同时间执行"

    - name: 🎲 计算基础延迟 (所有账号共享)
      id: pick-delay
      if: steps.check-schedule.outputs.should_run == 'true'
      env:
        RD: ${{ secrets.RD }}
      run: |
        if [ -n "$RD" ]; then
          MIN=$(echo "$RD" | cut -d: -f1)
          MAX=$(echo "$RD" | cut -d: -f2)
        else
          MIN=7200; MAX=21600
        fi
        DELAY=$(shuf -i $MIN-$MAX -n 1)
        echo "base_delay=$DELAY" >> $GITHUB_OUTPUT
        echo "trigger_epoch=$(date +%s)" >> $GITHUB_OUTPUT
        H=$(( DELAY / 3600 )); M=$(( (DELAY % 3600) / 60 ))
        echo "✅ 基础延迟: ${H}h${M}m，所有账号将在此之后分散执行"

    - name: 🎲 生成账号矩阵
      id: set-matrix
      if: steps.check-schedule.outputs.should_run == 'true'
      shell: bash
      env:
        ALL_SECRETS: ${{ toJson(secrets) }}
      run: |
        ACCOUNTS=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(startswith("EML_"))' | sed 's/EML_//' | shuf)
        if [ -z "$ACCOUNTS" ]; then
          echo "❌ 未检测到 EML_x 格式的 Secrets，请检查配置！"
          exit 1
        fi
        INDEX_ARRAY=$(echo "$ACCOUNTS" | jq -R . | jq -s -c .)
        echo "matrix=$INDEX_ARRAY" >> $GITHUB_OUTPUT
        echo "✅ 账号矩阵已构建：$INDEX_ARRAY"

  renew:
    needs: setup
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
    - name: 📥 下载代码
      uses: actions/checkout@v4

    - name: 🐍 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: ⏳ 等待基础窗口 (只有第一个账号实际等待)
      if: github.event_name == 'schedule'
      run: |
        NOW=$(date +%s)
        TRIGGER=${{ needs.setup.outputs.trigger_epoch }}
        BASE=${{ needs.setup.outputs.base_delay }}
        ELAPSED=$(( NOW - TRIGGER ))
        if [ $ELAPSED -lt $BASE ]; then
          SLEEP=$(( BASE - ELAPSED ))
          echo "账号 ${{ matrix.account_index }} 基础窗口等待 ${SLEEP}s..."
          sleep $SLEEP
        else
          echo "账号 ${{ matrix.account_index }} 基础窗口已过，立即执行"
        fi

    - name: 🛡️ 设置代理
      env:
        NODE_LINK: ${{ secrets.NODE_LINK }}
      run: |
        chmod +x setup_proxy.sh
        ./setup_proxy.sh

    - name: 🛠️ 安装自动化依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb x11-utils xdotool fonts-noto-cjk
        pip install seleniumbase requests
        seleniumbase install chromedriver

    - name: 🚀 运行账号 ${{ matrix.account_index }} 续期
      env:
        ACC: ${{ secrets[format('EML_{0}', matrix.account_index)] }}
        ACC_PWD: ${{ secrets[format('PWD_{0}', matrix.account_index)] }}
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_ID: ${{ secrets.TG_ID }}
        PROXY_URL: ${{ secrets.PROXY_URL }}
      run: |
        echo "开始处理账号索引: ${{ matrix.account_index }}"
        # 启动虚拟显示器并执行脚本
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          python reset_timer.py

    - name: ⏸️ 间隔等待 (前一个结束 1~3 分钟后下一个开始)
      if: github.event_name == 'schedule' && success()
      run: |
        STAGGER=$(( RANDOM % 120 + 60 ))
        echo "⏸️ 续期完成，等待 ${STAGGER}s 后执行下一个账号..."
        sleep $STAGGER

    - name: 📸 调试文件上传 (无论成功失败)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-acc-${{ matrix.account_index }}
        path: |
          *.png
          *.html
          *.log
        retention-days: 7
